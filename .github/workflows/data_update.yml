name: Daily Quantitative Data Pipeline

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

# 必须！赋予 GitHub Actions 提交代码回仓库的权限
permissions:
  contents: write

jobs:
  update-features:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn pyarrow

      - name: Run Data Update Pipeline
        run: python run_pipeline.py

      - name: Force Commit and Push
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          # 强制将生成的文件加入暂存区，无视任何隐藏的忽略规则
          git add -f jpm_features_final.parquet
          
          # 检查暂存区是否有文件，有才提交
          if git diff --staged --quiet; then
            echo "文件未发生数值变化，无需重复提交。"
          else
            git commit -m "Auto-update: Daily feature matrix update [skip ci]"
            git push
            echo "✅ 成功推送到仓库！"
          fi
